<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading values from input, textarea and select</title>
    <link rel="stylesheet" href="style1.css">
    
</head>
<body>
    <form  autocomplete="off" action="">
        <input pattern="[a-z],{3,8}"  minlength="3" maxlength="8" type="text" placeholder="name">
        <div id="hide">
        <br>
        <small>youe name should be greater than 2</small>
        </div>
        <br><br>
        <input type="email" placeholder="email">
        <br><br>
        <input type="password" placeholder="password">
        <br><br>
        <select name="" id="">
            <option value="male">Male</option>
            <option value="female">Female</option>
            <option value="other">Other</option>
        </select>
        <br><br>
        <textarea placeholder="Tell us about you!"></textarea>
        <br><br>
        <input type="submit">
    </form>
    <script src="script1.js"></script>
</body>
</html>
